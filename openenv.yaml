name: regcompliance-env
version: 1.0.0
description: Environment for training AI agents on Indian startup legal compliance classification. Agents read synthetic documents and identify compliance violations.
domain: legal-compliance
tasks:
  - id: task1
    name: Single clause detection
    difficulty: easy
  - id: task2
    name: Cross-document conflict detection
    difficulty: medium
  - id: task3
    name: Full due diligence audit
    difficulty: hard
api:
  reset: POST /reset
  step: POST /step
  state: GET /state
